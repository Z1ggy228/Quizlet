<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ziglish — тренажёр английского</title>
    <meta name="description" content="Ziglish — личный тренажёр английских слов" />

    <!-- Иконки: SVG для вкладок, PNG-фолбэк, apple-touch для iOS, manifest для Android -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <meta name="theme-color" content="#4f46e5" />
    <!-- Полноэкранный режим при запуске с домашнего экрана iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ziglish" />
    <script>
      // Ставим тему до первой отрисовки, чтобы не было вспышки светлого экрана.
      try {
        const saved = localStorage.getItem('theme')
        const dark = saved
          ? saved === 'dark'
          : window.matchMedia('(prefers-color-scheme: dark)').matches
        if (dark) document.documentElement.classList.add('dark')
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
