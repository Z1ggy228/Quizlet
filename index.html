<!doctype html>
<!-- class="dark" висит намертво: тема в приложении одна, тёмная. Раньше здесь
     был скрипт, читавший выбор из localStorage до первой отрисовки. -->
<html lang="ru" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ziglish — тренажёр английского</title>
    <meta name="description" content="Ziglish — личный тренажёр английских слов" />

    <!-- Иконки: SVG для вкладок, PNG-фолбэк, apple-touch для iOS, manifest для Android -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <meta name="theme-color" content="#4f46e5" />
    <!-- Полноэкранный режим при запуске с домашнего экрана iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ziglish" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
